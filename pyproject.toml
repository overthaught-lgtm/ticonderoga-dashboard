[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "ticonderoga-dashboard"
version = "0.1.0"
description = "A sleek, efficient Python API serving a dynamic dashboard frontend"
authors = [{name = "overthaught-lgtm", email = "overthaught@gmail.com"}]
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
]

[tool.poetry]
name = "ticonderoga-dashboard"
version = "0.1.0"
description = "A sleek, efficient Python API serving a dynamic dashboard frontend"
authors = ["overthaught-lgtm <overthaught@gmail.com>"]

[tool.poetry.dependencies]
python = "^3.9"
flask = "^3.0.0"
python-dotenv = "^1.0.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"
black = "^23.7.0"
ruff = "^0.1.0"
mypy = "^1.5.0"

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
select = ["E", "F", "W", "I"]
line-length = 100
target-version = "py39"
exclude = [".git", ".venv", "build", "dist"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=api --cov-report=html --cov-report=term-missing"
python_files = ["test_*.py"]
